<div class="app-shell">
  <header class="app-header">
    <span class="app-title">Pokémon Team Builder</span>
    <div class="theme-toggle">
      <span class="theme-label">{{ themeService.isDarkMode() ? 'Dark Mode' : 'Light Mode' }}</span>
      <button mat-icon-button (click)="themeService.toggle()" [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'" style="color: var(--mat-sys-on-primary)">
        <mat-icon>{{ themeService.isDarkMode() ? 'dark_mode' : 'light_mode' }}</mat-icon>
      </button>
    </div>
  </header>
  <main>
    <router-outlet />
  </main>
</div>
